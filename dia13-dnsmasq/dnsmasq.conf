interface=ens33
bind-interfaces
domain=codearts.local
local=/codearts.local/

# Rangos DHCP por departamento
dhcp-range=desarrollo,192.168.1.100,192.168.1.120,12h
dhcp-range=diseno,192.168.1.121,192.168.1.140,12h
dhcp-range=administracion,192.168.1.141,192.168.1.160,12h

# Reservas por MAC
dhcp-host=00:0c:29:2d:e8:47,pc-desarrollo,192.168.1.100
dhcp-host=00:11:22:33:44:55,impresora-admin,192.168.1.141
dhcp-host=AA:BB:CC:DD:EE:FF,camara-ip,192.168.1.150

# Lista blanca - solo MACs autorizadas
dhcp-ignore=tag:!known

# Logs
log-queries
log-dhcp
log-facility=/var/log/dnsmasq.log
